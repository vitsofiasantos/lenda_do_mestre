<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A Lenda do Mestre</title>
    
    <link rel="icon" href="favicon.png" type="image/png">
    
    <style>
        /* =========================================
           PALETA DE CORES E FONTES RETRO RPG
        ========================================= */
        @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Press+Start+2P&family=VT323&display=swap');

        :root {
            --bg-dark: #000000;
            --rpg-blue: #0000aa; 
            --rpg-border: #ffffff;
            --text-main: #ffffff;
            --text-gold: #f8b800;
            --text-red: #e52521;
            --text-green: #43b047;
            --font-title: 'Press Start 2P', cursive;
            --font-body: 'VT323', monospace;
            --font-hand: 'Caveat', cursive; 
            --grass-1: #559e35;
            --grass-2: #4d9130;
            --dirt: #c08d5b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; font-family: inherit; }
        
        /* Fundo Gramado Animado e Escuro Fixo */
        body {
            background-color: var(--grass-1);
            position: relative;
            font-family: var(--font-body);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            touch-action: none;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)),
                linear-gradient(rgba(0,0,0,0.08) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,0.08) 2px, transparent 2px),
                linear-gradient(45deg, var(--grass-2) 25%, transparent 25%, transparent 75%, var(--grass-2) 75%, var(--grass-2)),
                linear-gradient(45deg, var(--grass-2) 25%, transparent 25%, transparent 75%, var(--grass-2) 75%, var(--grass-2));
            background-size: 100% 100%, 32px 32px, 32px 32px, 64px 64px, 64px 64px;
            background-position: 0 0, 0 0, 0 0, 0 0, 32px 32px;
            animation: scrollBg 20s linear infinite;
            z-index: -1;
        }

        @keyframes scrollBg {
            from { background-position: 0 0, 0 0, 0 0, 0 0, 32px 32px; }
            to { background-position: 0 0, -64px -64px, -64px -64px, -64px -64px, -32px -32px; }
        }

        .scanlines {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; pointer-events: none; z-index: 1000;
        }

        /* Efeito Fade para Transição de Tela MAIS RÁPIDO */
        #transition-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: black; z-index: 2000; opacity: 0; pointer-events: none;
            transition: opacity 0.3s ease; 
        }

        /* =========================================
           TELA DE ABERTURA ANIMADA (TITLE SCREEN)
        ========================================= */
        #title-screen {
            position: absolute; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: transparent; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 500;
            text-align: center; padding: 20px;
        }

        .title-container { animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }

        #title-screen .crown-icon { font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 4px 0 rgba(0,0,0,0.8)); }
        #title-screen h1 { font-size: 36px; color: var(--text-gold); margin-bottom: 15px; line-height: 1.5; text-shadow: 4px 4px 0px var(--rpg-blue), 6px 6px 0px black; }
        #title-screen h2 { font-family: var(--font-body); font-size: 32px; color: var(--text-main); margin-bottom: 60px; letter-spacing: 2px; text-shadow: 2px 2px 0px black; }

        .blink-btn {
            background: rgba(0,0,0,0.8); border: 4px solid var(--rpg-border); color: var(--text-main);
            font-family: var(--font-title); font-size: 18px; padding: 15px 30px; cursor: pointer;
            animation: blinker 1.5s linear infinite steps(2); box-shadow: 4px 4px 0 black;
        }
        .blink-btn:hover { background: var(--text-main); color: var(--text-gold); }
        @keyframes blinker { 50% { opacity: 0; } }

        /* =========================================
           O MUNDO E A CÂMERA (VIEWPORT)
        ========================================= */
        #viewport {
            width: 100%; max-width: 900px; height: 100vh; max-height: 650px; position: relative;
            background-color: var(--bg-dark); border: 8px solid #333; border-radius: 8px; overflow: hidden;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(0,0,0,0.5); display: none; 
        }

        #world {
            position: absolute; width: 1500px; height: 1500px; background-color: var(--grass-1);
            background-image: 
                linear-gradient(rgba(0,0,0,0.08) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,0,0,0.08) 2px, transparent 2px),
                linear-gradient(45deg, var(--grass-2) 25%, transparent 25%, transparent 75%, var(--grass-2) 75%, var(--grass-2)),
                linear-gradient(45deg, var(--grass-2) 25%, transparent 25%, transparent 75%, var(--grass-2) 75%, var(--grass-2));
            background-size: 32px 32px, 32px 32px, 64px 64px, 64px 64px;
            background-position: 0 0, 0 0, 0 0, 32px 32px; transition: transform 0.1s linear; transform-origin: top left;
        }

        /* TRILHA DE AREIA EM 8-BIT PERFEITA */
        .dirt-path { 
            position: absolute; 
            background-color: #dcb57a; 
            background-image: 
                linear-gradient(45deg, #cda469 25%, transparent 25%, transparent 75%, #cda469 75%, #cda469),
                linear-gradient(45deg, #cda469 25%, transparent 25%, transparent 75%, #cda469 75%, #cda469);
            background-size: 16px 16px;
            background-position: 0 0, 8px 8px;
            z-index: 10; 
        }

        /* =========================================
           PERSONAGEM PRINCIPAL (Ele: Cabelo preto, Óculos)
        ========================================= */
        #player {
            position: absolute; width: 32px; height: 32px; z-index: 50;
            transition: left 0.05s linear, top 0.05s linear; filter: drop-shadow(0px 4px 0px rgba(0,0,0,0.4));
        }
        .sprite-head {
            width: 16px; height: 16px; background-color: #f1c27d; position: absolute; top: 0px; left: 8px;
            border-radius: 6px 6px 4px 4px; 
            box-shadow: inset 0 5px 0 #111; 
        }
        .sprite-glasses {
            position: absolute; top: 6px; left: 1px; width: 14px; height: 4px; display: flex; justify-content: space-between;
        }
        .sprite-glasses::before, .sprite-glasses::after {
            content: ''; width: 6px; height: 5px; border: 2px solid #222; background: rgba(255,255,255,0.6); border-radius: 1px;
        }
        .sprite-body {
            width: 20px; height: 10px; background-color: #2980b9; position: absolute; top: 16px; left: 6px;
            border-radius: 4px 4px 0 0; box-shadow: inset -2px -2px rgba(0,0,0,0.2);
        }
        .sprite-legs {
            width: 16px; height: 6px; background-color: #34495e; position: absolute; top: 26px; left: 8px; box-shadow: inset -2px -2px rgba(0,0,0,0.3);
        }

        /* =========================================
           NPCS (Você Cacheada com Franjinha e a Gatinha)
        ========================================= */
        #npc-girl {
            position: absolute; width: 32px; height: 32px; z-index: 45; 
            top: 145px; left: 740px; filter: drop-shadow(0px 4px 0px rgba(0,0,0,0.4));
        }
        .girl-hair {
            width: 22px; height: 15px; background-color: #a67c52; position: absolute; top: -1px; left: 5px;
            border-radius: 8px 8px 4px 4px; box-shadow: -2px 2px 0 #8b5e34, 2px 2px 0 #8b5e34; 
        }
        .girl-head {
            width: 14px; height: 14px; background-color: #f1c27d; position: absolute; top: 2px; left: 9px; border-radius: 4px; overflow: hidden;
        }
        .girl-bangs {
            position: absolute; top: 0; left: 0; width: 14px; height: 5px; background-color: #a67c52; border-bottom: 1px dotted #8b5e34; 
        }
        .girl-glasses {
            position: absolute; top: 6px; left: 0px; width: 14px; height: 4px; display: flex; justify-content: space-between;
        }
        .girl-glasses::before, .girl-glasses::after {
            content: ''; width: 5px; height: 5px; border: 2px solid #222; background: rgba(255,255,255,0.6); border-radius: 50%; 
        }
        .girl-body {
            width: 18px; height: 12px; background-color: #e84393; position: absolute; top: 16px; left: 7px; border-radius: 6px 6px 0 0;
        }
        .girl-legs {
            width: 12px; height: 4px; background-color: #f1c27d; position: absolute; top: 28px; left: 10px;
        }

        #npc-cat {
            position: absolute; width: 18px; height: 16px; z-index: 45; 
            top: 155px; left: 780px; filter: drop-shadow(0px 2px 0px rgba(0,0,0,0.4));
        }
        .cat-tail {
            position: absolute; width: 3px; height: 9px; background-color: #ffffff;
            top: 4px; left: -1px; border-radius: 3px; transform-origin: bottom center;
            animation: wag 1.5s infinite alternate ease-in-out;
        }
        @keyframes wag { 0% { transform: rotate(-15deg); } 100% { transform: rotate(-45deg); } }
        .cat-body {
            width: 14px; height: 10px; background-color: #ffffff; position: absolute; top: 6px; left: 2px; border-radius: 6px 6px 3px 3px;
            background-image: radial-gradient(circle at 10px 3px, #f39c12 4px, transparent 5px); 
        }
        .cat-ears {
            width: 14px; height: 6px; position: absolute; top: 0px; left: 2px;
        }
        .cat-ears::before, .cat-ears::after {
            content: ''; position: absolute; width: 0; height: 0;
            border-left: 3px solid transparent; border-right: 3px solid transparent; border-bottom: 6px solid #ffffff;
        }
        .cat-ears::before { left: 0px; }
        .cat-ears::after { right: 0px; border-bottom-color: #f39c12; }
        .cat-eyes {
            position: absolute; top: 4px; left: 3px; width: 8px; height: 2px; display: flex; justify-content: space-between; z-index: 2;
        }
        .cat-eyes::before, .cat-eyes::after {
            content: ''; width: 2px; height: 2px; background: #000; border-radius: 50%;
        }
        .cat-nose {
            position: absolute; top: 7px; left: 6px; width: 2px; height: 2px; background: #ff7aa2; border-radius: 50%; z-index: 2;
        }

        /* Objetos do mapa */
        .poi { position: absolute; display: flex; justify-content: center; align-items: flex-end; z-index: 40; }
        .poi-sprite { font-size: 52px; line-height: 52px; filter: drop-shadow(0px 6px 0px rgba(0,0,0,0.4)); }
        
        .poi-label {
            position: absolute; 
            bottom: 60px; 
            background: rgba(0,0,0,0.8); padding: 4px 8px;
            font-family: var(--font-title); font-size: 10px; color: white; border: 2px solid white; white-space: nowrap;
            animation: float 3s ease-in-out infinite;
        }

        #action-bubble {
            position: absolute; width: 24px; height: 24px; background: white; border: 3px solid black;
            color: black; font-family: var(--font-title); font-size: 14px; text-align: center; line-height: 18px;
            top: -30px; left: 4px; border-radius: 50%; display: none; animation: bounce 0.4s infinite alternate; z-index: 60;
        }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-6px); } }

        /* Decorações do Cenário e Sapinhos */
        .decor { position: absolute; font-size: 24px; z-index: 20; filter: drop-shadow(0 3px 0 rgba(0,0,0,0.3)); }
        .tree { font-size: 40px; z-index: 30; }

        /* =========================================
           CAIXA DE DIÁLOGO / MODAL RPG
        ========================================= */
        #modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7);
            z-index: 200; display: none; justify-content: center; align-items: center; padding: 20px;
        }
        .rpg-box {
            background-color: var(--rpg-blue); border: 4px solid var(--rpg-border); outline: 2px solid var(--bg-dark);
            outline-offset: -6px; padding: 25px; width: 100%; max-width: 650px; max-height: 90vh; overflow-y: auto;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.9); position: relative; animation: fadeIn 0.2s;
        }
        .rpg-box::-webkit-scrollbar { width: 10px; }
        .rpg-box::-webkit-scrollbar-thumb { background: var(--rpg-border); border: 2px solid var(--bg-dark); }
        @keyframes fadeIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .rpg-box h1 { font-family: var(--font-title); font-size: 16px; color: var(--text-gold); text-align: center; line-height: 1.5; margin-bottom: 15px; text-shadow: 2px 2px 0 #000; }
        .rpg-box p { font-size: 20px; line-height: 1.5; text-shadow: 2px 2px 0 #000; margin-bottom: 15px; }

        .btn-close {
            display: block; width: 100%; background-color: var(--bg-dark); border: 3px solid var(--rpg-border);
            color: var(--text-main); font-family: var(--font-title); font-size: 14px; padding: 12px; margin-top: 25px;
            cursor: pointer; text-transform: uppercase;
        }
        .btn-close:hover { background-color: var(--text-main); color: var(--text-gold); }

        /* POLAROIDS ESTÉTICA 8-BIT */
        .friends-album {
            display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; justify-content: flex-start;
            scrollbar-width: thin; scrollbar-color: var(--text-gold) var(--bg-dark); margin-top: 15px;
        }
        .friends-album.center-album { justify-content: center; } 
        .friends-album::-webkit-scrollbar { height: 10px; }
        .friends-album::-webkit-scrollbar-thumb { background: var(--text-gold); border-radius: 5px; }
        
        .polaroid-card {
            background: var(--rpg-blue); padding: 10px 10px 15px 10px; flex-shrink: 0; width: 170px;
            box-shadow: 6px 6px 0px rgba(0,0,0,0.9); border: 4px solid var(--rpg-border);
            outline: 2px solid var(--bg-dark); outline-offset: -6px;
        }
        .polaroid-card img { 
            width: 100%; height: 140px; object-fit: cover; border: 2px solid #fff; 
            filter: contrast(1.1) sepia(0.2); image-rendering: pixelated; 
        }
        .polaroid-card p { 
            font-family: var(--font-body); color: var(--text-gold); text-align: center; 
            font-size: 18px; line-height: 1.2; margin-top: 10px; text-shadow: 2px 2px 0px #000; margin-bottom: 0; text-transform: uppercase;
        }

        /* Estilos Internos do Modal */
        .inventory-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 15px; }
        .item { background: #111; border: 3px solid #555; padding: 10px; text-align: center; cursor: pointer; }
        .item:hover { border-color: var(--text-gold); background: #222; transform: scale(1.02); }
        .item-title { font-family: var(--font-title); font-size: 10px; color: var(--text-gold); margin: 8px 0; line-height: 1.4;}
        .item-desc { font-size: 18px; display: none; margin-top: 5px; color: var(--text-main); }
        .item.used { opacity: 0.4; border-color: red; filter: grayscale(1); }

        .stat-row { display: flex; align-items: center; margin-bottom: 12px; }
        .stat-label { font-family: var(--font-title); font-size: 10px; width: 100px; color: var(--text-gold); }
        .stat-bar-bg { flex-grow: 1; height: 18px; background: #333; border: 2px solid white; position: relative; }
        .stat-bar-fill { height: 100%; background: var(--text-green); transition: width 1s; }

        /* =========================================
           CAIXA DE DIÁLOGO POKÉMON
        ========================================= */
        #pokemon-dialogue {
            position: absolute; 
            top: 90px; 
            left: 50%; transform: translateX(-50%);
            width: 85%; max-width: 500px;
            background-color: var(--rpg-blue); border: 4px solid var(--rpg-border);
            outline: 2px solid var(--bg-dark); outline-offset: -6px;
            padding: 15px 20px; box-shadow: 4px 4px 0 rgba(0,0,0,0.8);
            z-index: 150; display: none; min-height: 70px;
            pointer-events: none;
        }
        #pokemon-text {
            font-size: 18px; font-family: var(--font-body); color: var(--text-main); 
            text-shadow: 2px 2px 0 #000; margin: 0; line-height: 1.4;
        }

        /* =========================================
           ESTILOS DO FILTRO DO TERMOO (ESTILO MINIJOGOS)
        ========================================= */
        .termoo-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 10px; }
        .termoo-grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 5px; }
        .termoo-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; }
        .termoo-cell {
            width: 45px; height: 45px; border: 3px solid #555; background: #111;
            display: flex; justify-content: center; align-items: center;
            font-family: var(--font-title); font-size: 16px; color: white; text-transform: uppercase;
        }
        .termoo-cell.correct { background-color: var(--text-green); border-color: #fff; }
        .termoo-cell.present { background-color: var(--text-gold); border-color: #fff; }
        .termoo-cell.absent { background-color: #333; border-color: #555; }
        
        .termoo-keyboard { display: flex; flex-direction: column; gap: 5px; align-items: center; width: 100%; max-width: 400px; margin-top: 10px; }
        .termoo-kb-row { display: flex; gap: 4px; justify-content: center; width: 100%; }
        .termoo-key {
            padding: 10px 6px; min-width: 28px; background: #333; border: 2px solid #555;
            color: white; font-family: var(--font-body); font-size: 18px; cursor: pointer; text-align: center;
        }
        .termoo-key:active { background: #555; }
        .termoo-key.key-correct { background-color: var(--text-green) !important; }
        .termoo-key.key-present { background-color: var(--text-gold) !important; }
        .termoo-key.key-absent { background-color: #111 !important; color: #555; }

        /* =========================================
           CONTROLES MOBILE E DICAS
        ========================================= */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100; pointer-events: none; }
        
        .top-buttons {
            position: absolute; top: 15px; right: 15px;
            display: flex; gap: 10px; pointer-events: auto;
        }
        
        #btn-mute, #btn-home {
            background: rgba(0,0,0,0.6); padding: 8px 12px;
            font-family: var(--font-title); font-size: 12px; color: white; border: 2px solid white;
            cursor: pointer; text-shadow: 1px 1px 0 #000;
        }
        
        #btn-mute:hover, #btn-home:hover { background: white; color: var(--text-gold); text-shadow: none; }

        .helper-text {
            position: absolute; top: 15px; left: 15px; background: rgba(0,0,0,0.6); padding: 8px 12px;
            font-size: 18px; color: white; border: 2px solid white; text-shadow: 1px 1px 0 #000;
            transition: opacity 0.5s ease-out; 
        }
        
        .controls-mobile {
            position: absolute; bottom: 20px; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: flex-end; pointer-events: auto;
        }
        .dpad { display: grid; grid-template-columns: 50px 50px 50px; grid-template-rows: 50px 50px 50px; gap: 5px; }
        .dpad-btn { background: rgba(0,0,0,0.5); border: 2px solid rgba(255,255,255,0.7); border-radius: 8px; color: white; display: flex; justify-content: center; align-items: center; font-size: 24px; cursor: pointer; }
        .dpad-btn:active { background: rgba(255,255,255,0.8); color: black; }
        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        .action-btn {
            width: 75px; height: 75px; border-radius: 50%;
            background: rgba(248, 184, 0, 0.6); border: 4px solid var(--text-gold); color: white;
            font-family: var(--font-title); font-size: 12px; display: flex; justify-content: center;
            align-items: center; cursor: pointer; margin-bottom: 15px; text-shadow: 1px 1px 0 #000;
        }
        .action-btn:active { background: var(--text-gold); color: black; text-shadow: none;}

        @media (min-width: 768px) { .controls-mobile { display: none; } }

    </style>
</head>
<body>

    <div class="scanlines"></div>
    <div id="transition-overlay"></div>

    <div id="title-screen">
        <div class="title-container">
            <div class="crown-icon">👑</div>
            <h1>A LENDA DO MESTRE</h1>
            <h2>A 27ª FASE DE MATEUS FALCÃO</h2>
        </div>
        <button id="start-btn" class="blink-btn">PRESS START</button>
    </div>

    <div id="viewport">
        <div id="world">
            
            <div class="dirt-path" style="top: 1300px; left: 150px; width: 1050px; height: 60px;"></div>
            <div class="dirt-path" style="top: 800px; left: 1140px; width: 60px; height: 500px;"></div>
            <div class="dirt-path" style="top: 800px; left: 350px; width: 850px; height: 60px;"></div>
            <div class="dirt-path" style="top: 400px; left: 350px; width: 60px; height: 400px;"></div>
            <div class="dirt-path" style="top: 400px; left: 350px; width: 850px; height: 60px;"></div>
            <div class="dirt-path" style="top: 150px; left: 1140px; width: 60px; height: 300px;"></div>
            <div class="dirt-path" style="top: 150px; left: 750px; width: 400px; height: 60px;"></div>

            <div class="poi" id="poi-1" style="top: 1210px; left: 250px; width: 80px; height: 80px;" data-id="intro">
                <div class="poi-label">Origem</div><div class="poi-sprite">🏠</div>
            </div>
            <div class="poi" id="poi-2" style="top: 1210px; left: 750px; width: 100px; height: 100px;" data-id="status">
                <div class="poi-label">Guilda do Herói</div><div class="poi-sprite">⚔️</div>
            </div>
            <div class="poi" id="poi-3" style="top: 900px; left: 1050px; width: 80px; height: 80px;" data-id="friends">
                <div class="poi-label">Aliados</div><div class="poi-sprite">⛺</div>
            </div>
            <div class="poi" id="poi-4" style="top: 710px; left: 550px; width: 80px; height: 80px;" data-id="potions">
                <div class="poi-label">Loja de Magia</div><div class="poi-sprite">🔮</div>

        const epicMelody = [
            440, 440, 440, 440, 523, 587, 659, 659, 
            587, 523, 587, 659, 440, 440, 392, 440,
            587, 587, 587, 698, 784, 880, 880, 784,
            698, 784, 880, 523, 523, 587, 659, 659

        function playTrackNote() {
            if (isMuted || audioCtx.state === 'suspended') return;
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'triangle'; 
            osc.frequency.setValueAtTime(epicMelody[noteIndex], audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(0.06, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
            
            noteIndex = (noteIndex + 1) % epicMelody.length;
        }

        function startEpicMusic() {
            if(musicInterval) clearInterval(musicInterval);
            musicInterval = setInterval(playTrackNote, 220); 
        }

        function stopEpicMusic() {
            clearInterval(musicInterval);
        }

        function play8BitSFX(type) {
            if(isMuted) return;
            if(audioCtx.state === 'suspended') audioCtx.resume();
            
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square';
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            const now = audioCtx.currentTime;
            
            if(type === 'click') {
                osc.frequency.setValueAtTime(600, now);
                osc.frequency.exponentialRampToValueAtTime(300, now + 0.05);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.05);
                osc.start(now);
                osc.stop(now + 0.05);
            } else if (type === 'action') {
                osc.frequency.setValueAtTime(300, now);
                osc.frequency.exponentialRampToValueAtTime(800, now + 0.15);
                gainNode.gain.setValueAtTime(0.05, now);
                gainNode.gain.linearRampToValueAtTime(0.05, now + 0.1);
                gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
                osc.start(now);
                osc.stop(now + 0.15);
            } else if (type === 'start') {
                osc.frequency.setValueAtTime(400, now);
                osc.frequency.setValueAtTime(600, now + 0.1);
                osc.frequency.setValueAtTime(800, now + 0.2);
                osc.frequency.setValueAtTime(1200, now + 0.3);
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else if (type === 'victory') {
                osc.frequency.setValueAtTime(523, now);
                osc.frequency.setValueAtTime(659, now + 0.1);
                osc.frequency.setValueAtTime(784, now + 0.2);
                osc.frequency.setValueAtTime(1046, now + 0.3);
                gainNode.gain.setValueAtTime(0.08, now);
                gainNode.gain.linearRampToValueAtTime(0, now + 0.6);
                osc.start(now);
                osc.stop(now + 0.6);
            }
        }

        /* =========================================
           SISTEMA LOGICIAL DO MINIJOGO TERMOO (PALAVRA: VIDA)
        ========================================= */
        const targetWord = "VIDA";
        let termooRow = 0;
        let termooCol = 0;
        let termooOver = false;
        let isTermooCleared = false;

        function buildTermoo() {
            let html = `<div class="termoo-container">
                <p style="font-size:18px; color:var(--text-gold); text-align:center;">Adivinhe a palavra de 4 letras para abrir o castelo!</p>
                <div class="termoo-grid" id="t-grid">`;
            for (let r = 0; r < 6; r++) {
                html += `<div class="termoo-row">`;
                for (let c = 0; c < 4; c++) {
                    html += `<div class="termoo-cell" id="t-${r}-${c}"></div>`;
                }
                html += `</div>`;
            }
            html += `</div><div class="termoo-keyboard">`;
            const keyboardRows = ["QWERTYUIOP", "ASDFGHJKL", "ZXCVBNM"];
            keyboardRows.forEach((row, rowIndex) => {
                html += `<div class="termoo-kb-row">`;
                if(rowIndex === 2) html += `<button class="termoo-key" onclick="handleTermooInput('ENTER')">ENT</button>`;
                for (let char of row) {
                    html += `<button class="termoo-key" id="tk-${char}" onclick="handleTermooInput('${char}')">${char}</button>`;
                }
                if(rowIndex === 2) html += `<button class="termoo-key" onclick="handleTermooInput('BACKSPACE')">⌫</button>`;
                html += `</div>`;
            });
            html += `</div></div>`;
            return html;
        }

        function handleTermooInput(key) {
            if (termooOver) return;
            play8BitSFX('click');

            if (key === 'BACKSPACE') {
                if (termooCol > 0) {
                    termooCol--;
                    document.getElementById(`t-${termooRow}-${termooCol}`).innerText = '';
                }
            } else if (key === 'ENTER') {
                if (termooCol === 4) {
                    checkTermooRow();
                }
            } else if (/^[A-Z]$/.test(key)) {
                if (termooCol < 4) {
                    document.getElementById(`t-${termooRow}-${termooCol}`).innerText = key;
                    termooCol++;
                }
            }
        }

        function checkTermooRow() {
            let guess = "";
            for(let c=0; c<4; c++) {
                guess += document.getElementById(`t-${termooRow}-${c}`).innerText;
            }

            let tempTarget = targetWord;
            let states = Array(4).fill('absent');

            for (let i = 0; i < 4; i++) {
                if (guess[i] === tempTarget[i]) {
                    states[i] = 'correct';
                    tempTarget = tempTarget.substring(0, i) + '_' + tempTarget.substring(i + 1);
                }
            }

            for (let i = 0; i < 4; i++) {
                if (states[i] !== 'correct') {
                    let index = tempTarget.indexOf(guess[i]);
                    if (index !== -1) {
                        states[i] = 'present';
                        tempTarget = tempTarget.substring(0, index) + '_' + tempTarget.substring(index + 1);
                    }
                }
            }

            for (let c = 0; c < 4; c++) {
                const cell = document.getElementById(`t-${termooRow}-${c}`);
                const letter = guess[c];
                const state = states[c];
                cell.classList.add(state);

                const keyBtn = document.getElementById(`tk-${letter}`);
                if (keyBtn) {
                    if (state === 'correct') {
                        keyBtn.className = "termoo-key key-correct";
                    } else if (state === 'present' && !keyBtn.classList.contains('key-correct')) {
                        keyBtn.className = "termoo-key key-present";
                    } else if (state === 'absent' && !keyBtn.classList.contains('key-correct') && !keyBtn.classList.contains('key-present')) {
                        keyBtn.className = "termoo-key key-absent";
                    }
                }
            }

            if (guess === targetWord) {
                termooOver = true;
                isTermooCleared = true;
                play8BitSFX('victory');
                setTimeout(() => {
                    document.getElementById('modal-title').innerHTML = "EPÍLOGO - GAME CLEARED";
                    document.getElementById('modal-content').innerHTML = epilogueRealContent;
                }, 1000);
                return;
            }

            termooRow++;
            termooCol = 0;

            if (termooRow === 6) {
                termooOver = true;
                alert("Game Over! Tente novamente fechando e abrindo o Castelo.");
            }
        }

        /* =========================================

        ========================================= */
        let typeInterval;
        function showDialogue(text) {
            const box = document.getElementById('pokemon-dialogue');
            const p = document.getElementById('pokemon-text');
            box.style.display = 'block';
            p.innerHTML = '';
            clearInterval(typeInterval);
            let i = 0;
            typeInterval = setInterval(() => {
                if(i < text.length) {
                    p.innerHTML += text.charAt(i);
                    i++;
                } else {
                    clearInterval(typeInterval);
                }
            }, 30);
        }

        function hideDialogue() {
            document.getElementById('pokemon-dialogue').style.display = 'none';
            clearInterval(typeInterval);
        }

        /* =========================================
           GERAÇÃO DO CENÁRIO E SAPINHOS
        ========================================= */
        function generateDecor() {
            const container = document.getElementById('decor-container');
            const items = ['🌸', '🍄', '🪨', '🌲', '🌲', '🌿', '🐸'];
            const worldSize = 1500;
            
            const paths = [
                {x: 150, y: 1300, w: 1050, h: 60},
                {x: 1140, y: 800, w: 60, h: 500},
                {x: 350, y: 800, w: 850, h: 60},
                {x: 350, y: 400, w: 60, h: 400},
                {x: 350, y: 400, w: 850, h: 60},
                {x: 1140, y: 150, w: 60, h: 300},
                {x: 750, y: 150, w: 400, h: 60}
            ];

            function isOverlappingPath(x, y) {
                for (let p of paths) {
                    if (x > p.x - 40 && x < p.x + p.w + 40 && y > p.y - 40 && y < p.y + p.h + 40) {
                        return true;
                    }
                }
                return false;
            }

            for(let i=0; i<180; i++) {
                let x = Math.random() * (worldSize - 50);
                let y = Math.random() * (worldSize - 50);
                
                if (isOverlappingPath(x, y)) continue;

                let el = document.createElement('div');
                let char = items[Math.floor(Math.random() * items.length)];
                
                el.className = char === '🌲' ? 'decor tree' : 'decor';
                el.innerText = char;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                
                if (char === '🐸') {
                   el.style.animation = 'bounce 2s infinite alternate ease-in-out';
                }
                
                container.appendChild(el);
            }
        }
        generateDecor();

        /* =========================================
           ENGINE DO JOGO (MOVIMENTO E COLISÃO)
        ========================================= */
        const actionBubble = document.getElementById('action-bubble');
        const modalOverlay = document.getElementById('modal-overlay');
        
        let pX = 160; 
        let pY = 1315; 
        const speed = 6; 
        const pSize = 32; 
        const worldSize = 1500;

        let keys = { w: false, a: false, s: false, d: false };
        let activePOI = null;
        let isModalOpen = false;
        let hasPassedOrigens = false; 

        window.addEventListener('keydown', e => {
            if(titleScreen.style.display !== 'none') return;
            
            if (e.key === ' ' || e.key === 'Spacebar') {
                e.preventDefault();
            }
            
            if (isModalOpen && activePOI && activePOI.id === 'epilogue' && !termooOver) {
                let k = e.key.toUpperCase();
                if (k === 'ENTER' || k === 'BACKSPACE' || /^[A-Z]$/.test(k)) {
                    handleTermooInput(k === 'ENTER' ? 'ENTER' : k === 'BACKSPACE' ? 'BACKSPACE' : k);
                }
                return;
            }

            if (e.key === 'w' || e.key === 'ArrowUp') keys.w = true;
            if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = true;
            if (e.key === 's' || e.key === 'ArrowDown') keys.s = true;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.d = true;
            if (e.key === 'e' || e.key === ' ' || e.key === 'Enter') {
                handleAction();
            }
        });

        window.addEventListener('keyup', e => {
            if (e.key === 'w' || e.key === 'ArrowUp') keys.w = false;
            if (e.key === 'a' || e.key === 'ArrowLeft') keys.a = false;
            if (e.key === 's' || e.key === 'ArrowDown') keys.s = false;
            if (e.key === 'd' || e.key === 'ArrowRight') keys.d = false;
        });

        const bindBtn = (id, key) => {
            const btn = document.getElementById(id);
            btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
            btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
            btn.addEventListener('mousedown', () => keys[key] = true);
            btn.addEventListener('mouseup', () => keys[key] = false);
            btn.addEventListener('mouseleave', () => keys[key] = false);
        };
        bindBtn('btn-up', 'w'); bindBtn('btn-left', 'a'); bindBtn('btn-down', 's'); bindBtn('btn-right', 'd');
        
        document.getElementById('btn-action').addEventListener('click', handleAction);
        document.getElementById('btn-action').addEventListener('touchstart', (e) => { e.preventDefault(); handleAction(); });

        const pois = Array.from(document.querySelectorAll('.poi')).map(el => {
            return {
                id: el.getAttribute('data-id'),
                x: parseInt(el.style.left),
                y: parseInt(el.style.top),
                w: parseInt(el.style.width),
                h: parseInt(el.style.height)
            };
        });

        function checkProximity() {
            let found = null;
            let cx = pX + pSize/2;
            let cy = pY + pSize/2;

            for (let poi of pois) {
                let pcx = poi.x + poi.w/2;
                let pcy = poi.y + poi.h/2;
                let dist = Math.hypot(cx - pcx, cy - pcy);
                
                if (dist < 90) { 
                    found = poi;
                    break;
                }
            }

            if (!hasPassedOrigens && pX > 320) {
                hasPassedOrigens = true;
                helpBox.style.opacity = '0';
                setTimeout(() => { if(hasPassedOrigens) helpBox.style.display = 'none'; }, 500);
            }

            if (found !== activePOI) {
                activePOI = found;
                actionBubble.style.display = activePOI ? 'block' : 'none';
                
                if(activePOI && !isModalOpen) {
                    showDialogue(gameData[activePOI.id].popup);
                    if(!hasPassedOrigens) {
                        document.getElementById('instruction-txt').innerText = "Pressione ESPAÇO ou ENTER para explorar!";
                        document.getElementById('instruction-txt').style.color = "var(--text-green)";
                    }
                } else {
                    hideDialogue();
                    if(!hasPassedOrigens) {
                        document.getElementById('instruction-txt').innerText = "Mova com WASD ou Setas";
                        document.getElementById('instruction-txt').style.color = "white";
                    }
                }
            }
        }

        function handleAction() {
            if (isModalOpen) { 
                if(activePOI && activePOI.id === 'epilogue' && !isTermooCleared) return;
                closeModal(); 
                return; 
            }
            if (activePOI) { 
                play8BitSFX('action');
                openModal(activePOI.id); 
            }
        }

        function openModal(id) {
            const data = gameData[id];
            if (!data) return;
            isModalOpen = true;
            hideDialogue();
            
            if(id === 'intro' && !hasPassedOrigens) {
                hasPassedOrigens = true;
                helpBox.style.opacity = '0';
                setTimeout(() => { helpBox.style.display = 'none'; }, 500);
            }
            
            document.getElementById('modal-title').innerHTML = data.title;
            
            if (data.isTermoo) {
                if(!isTermooCleared) {
                    termooRow = 0; termooCol = 0; termooOver = false;
                    document.getElementById('modal-content').innerHTML = buildTermoo();
                } else {
                    document.getElementById('modal-title').innerHTML = "GAME CLEARED";
                    document.getElementById('modal-content').innerHTML = epilogueRealContent;
                }
            } else {
                document.getElementById('modal-content').innerHTML = data.html;
            }
            
            modalOverlay.style.display = 'flex';
        }

        function closeModal() {
            play8BitSFX('click');
            isModalOpen = false;
            modalOverlay.style.display = 'none';
            keys = { w: false, a: false, s: false, d: false }; 
            if(activePOI) showDialogue(gameData[activePOI.id].popup);
        }
        document.getElementById('btn-close-modal').addEventListener('click', closeModal);

        function gameLoop() {
            if (!isModalOpen) {
                let dx = 0; let dy = 0;
                if (keys.w) dy -= speed;
                if (keys.s) dy += speed;
                if (keys.a) dx -= speed;
                if (keys.d) dx += speed;

                if (dx !== 0 || dy !== 0) {
                    pX = Math.max(0, Math.min(worldSize - pSize, pX + dx));
                    pY = Math.max(0, Math.min(worldSize - pSize, pY + dy));
                    player.style.left = pX + 'px';
                    player.style.top = pY + 'px';
                }

                checkProximity();
            }

            let vW = viewport.clientWidth;
            let vH = viewport.clientHeight;
            let camX = -pX + vW / 2 - pSize / 2;
            let camY = -pY + vH / 2 - pSize / 2;

            camX = Math.min(0, Math.max(vW - worldSize, camX));
            camY = Math.min(0, Math.max(vH - worldSize, camY));

            world.style.transform = `translate(${camX}px, ${camY}px)`;

            if(titleScreen.style.display === 'none') {
                requestAnimationFrame(gameLoop);
            }
        }

    </script>
</body>
